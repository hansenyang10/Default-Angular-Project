<div class="table-wrapper mat-elevation-z2">
      <table mat-table [dataSource]="data()" class="mat-table">
        @for (col of columns(); track col.def) {
          <ng-container [matColumnDef]="col.def">
            <th mat-header-cell *matHeaderCellDef> {{ col.header }} </th>
            <td mat-cell *matCellDef="let element">
              @if (columnTemplates() && columnTemplates()[col.def]) {
                <ng-container 
                  [ngTemplateOutlet]="columnTemplates()[col.def]" 
                  [ngTemplateOutletContext]="{ $implicit: element }">
                </ng-container>
              } @else {
                {{ element[col.field!] }}
              }
            </td>
          </ng-container>
        }

        <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns();"></tr>
      </table>

      <div class="custom-paginator">
        <span class="page-info">Page {{ pageNumber() }}</span>
        <div class="paginator-buttons">
          <button mat-icon-button [disabled]="pageNumber() === 1" (click)="onPageChange(-1)">
            <mat-icon>chevron_left</mat-icon>
          </button>
          <button mat-icon-button [disabled]="!hasNext()" (click)="onPageChange(1)">
            <mat-icon>chevron_right</mat-icon>
          </button>
        </div>
      </div>
